<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  padding: 0;
  background: #0b0b0b;
  font-family: 'Segoe UI', sans-serif;
  color: #d7d7d7;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #ff2a2a, #7a0000);
  padding: 18px;
  text-align: center;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #f5f5f5;
  border-bottom: 2px solid #d7d7d7;
  text-transform: uppercase;
}

/* PHOTO BADGE */
.photo-box {
  width: 100%;
  height: 160px;
  background: #1a1a1a;
  border-bottom: 2px solid #ff2a2a;
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-box img {
  max-height: 100%;
  max-width: 100%;
  object-fit: cover;
  border-radius: 6px;
}

/* STATUS INDICATOR */
.status {
  width: 90%;
  margin: 20px auto;
  padding: 20px;
  background: #1a1a1a;
  border: 2px solid #d7d7d7;
  border-radius: 10px;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #ff2a2a;
}

/* BUTTONS */
button {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 14px;
  background: #1a1a1a;
  border: 2px solid #ff2a2a;
  border-radius: 10px;
  color: #d7d7d7;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
  transition: 0.2s;
}

button:hover {
  background: #ff2a2a;
  color: #0b0b0b;
  transform: scale(1.03);
}

/* RAW DATA BOX */
#stateBox {
  width: 90%;
  margin: 20px auto;
  padding: 15px;
  background: #1a1a1a;
  border: 2px solid #d7d7d7;
  border-radius: 10px;
  color: #ff2a2a;
  font-size: 14px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="header">Protect‑Lace Sentinel</div>

<div class="photo-box">
  <img src="sentinel.jpg" id="mainPhoto">
</div>

<div id="status" class="status">Loading...</div>

<button onclick="setSensitivity(0)">Low Sensitivity</button>
<button onclick="setSensitivity(1)">Balanced</button>
<button onclick="setSensitivity(2)">High Sensitivity</button>

<pre id="stateBox">Waiting...</pre>

<script>
function fetchState(){
  fetch('/state')
    .then(r => r.json())
    .then(j => {
      document.getElementById('stateBox').innerText =
        JSON.stringify(j, null, 2);

      if (j.behind == true) {
        document.getElementById('status').innerText = "⚠ Someone Behind You";
        document.getElementById('status').style.color = "#ff2a2a";
      } else {
        document.getElementById('status').innerText = "Clear";
        document.getElementById('status').style.color = "#d7d7d7";
      }
    });
}

function setSensitivity(s){
  fetch('/sensitivity', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: 'sense=' + s
  }).then(fetchState);
}

setInterval(fetchState, 800);
fetchState();
</script>

</body>
</html>
